<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMPI Galaxy | Professional Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Glassmorphism Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h1>HMPI <span>Galaxy</span></h1>
                <p>Groundwater Monitoring Locations</p>
            </div>
            
            <div class="dashboard-cards">
                <div class="card live-status-card">
                    <h3>Live System Status</h3>
                    <div class="status-indicator">
                        <span class="pulse"></span> Active (WRIS Sync)
                    </div>
                </div>

                <div class="card ai-prediction-card">
                    <h3>AI Trend Prediction</h3>
                    <div class="prediction-value" id="ai-pred-value">--</div>
                    <p class="prediction-label">Forecasted HMPI</p>
                </div>

                <div class="card summary-card" id="region-card">
                    <h3>Region Quality</h3>
                    <div class="quality-badge" id="quality-badge">Awaiting Data</div>
                    <div class="stat-row">
                        <span>Current HMPI:</span>
                        <strong id="current-hmpi">--</strong>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="refresh-btn" class="btn primary-btn"><i data-lucide="refresh-cw"></i> Fetch Live Data</button>
                <button id="load-history-btn" class="btn secondary-btn"><i data-lucide="map"></i> Load Historical</button>
            </div>
            
            <div class="location-list-header">
                <h3><i data-lucide="map-pin"></i> Monitored Locations</h3>
            </div>
            <div class="location-cards-container" id="location-cards">
                <!-- Location buttons injected here rapidly -->
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-area">
            <div id="map"></div>
            
            <!-- Map Legend Overlays -->
            <div class="map-legend">
                <div class="legend-item"><div class="dot bg-green"></div><span>Low (&lt;50)</span></div>
                <div class="legend-item"><div class="dot bg-yellow"></div><span>Moderate (50-100)</span></div>
                <div class="legend-item"><div class="dot bg-orange"></div><span>High (100-200)</span></div>
                <div class="legend-item"><div class="dot bg-red"></div><span>Critical (&gt;200)</span></div>
            </div>

            <!-- Overlay for loading -->
            <div id="loading-overlay" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing Data...</p>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons(); // Initialize the sleek Lucide icons instantly
    </script>
</body>
</html>
